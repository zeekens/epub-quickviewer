name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./build.sh

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          ditto -c -k --keepParent "build/EPUB Quickviewer.app" \
            "dist/EPUB-Quickviewer-${VERSION}-arm64.zip"

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_RE=$(printf '%s' "$VERSION" | sed 's/\./\\./g')
          awk -v ver="$VERSION_RE" '
            $0 ~ "^## \\[?" ver "\\]?([^0-9.]|$)" { found = 1; next }
            found && /^## /                       { exit }
            found                                 { print }
          ' CHANGELOG.md | sed -e '1{/^$/d;}' > dist/notes.md
          if [ ! -s dist/notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version ${VERSION}." \
                 "Add a '## [${VERSION}]' heading before tagging."
            exit 1
          fi
          echo "--- release notes ---"
          cat dist/notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/EPUB-Quickviewer-${VERSION}-arm64.zip" \
            --title "epub-quickviewer ${VERSION}" \
            --notes-file dist/notes.md
